# The tested JetPack versions.
ALLOWED_L4T_VERSIONS:
  - 36.3.0
  - 36.4.0
  - 36.4.3
  - 36.4.4
  - 36.4.5
  - 36.5.0
# 24GB model + image ≈ 70GB+ recommended free space
REQUIRED_DISK_SPACE: 80
# AGX Orin 64G (60GB+) required — 32G modules cannot run this model
REQUIRED_MEM_SPACE: 60
PACKAGES:
  - nvidia-jetpack
  - aria2
DOCKER:
  ENABLE: false
  DAEMON: |
    {
      "default-runtime": "nvidia",
      "runtimes": {
        "nvidia": {
          "path": "nvidia-container-runtime",
          "runtimeArgs": []
        }
      },
      "storage-driver": "overlay2",
      "data-root": "/var/lib/docker",
      "log-driver": "json-file",
      "log-opts": {
        "max-size": "100m",
        "max-file": "3"
      },
      "no-new-privileges": true,
      "experimental": false
    }
