depth_registration: false
enable_point_cloud: false
enable_colored_point_cloud: false
device_preset: "High Accuracy"
laser_on_off_mode: 1
time_domain: "device"
enable_sync_host_time: true
align_mode: "SW"
camera_name: "camera"
enable_3d_reconstruction_mode: false

enable_color: false
color_width: 640
color_height: 480
color_fps: 5
color_format: "RGB"
color_qos: "SENSOR_DATA"

depth_width: 640
depth_height: 400
depth_fps: 15
depth_format: "Y16"
depth_qos: "SENSOR_DATA"
point_cloud_qos: "SENSOR_DATA"

enable_ir_auto_exposure: false
ir_exposure: 5000
ir_gain: 40

enable_left_ir: true
left_ir_width: 640
left_ir_height: 400
left_ir_fps: 15
left_ir_format: "Y8"
left_ir_qos: "SENSOR_DATA"

enable_right_ir: true
right_ir_width: 640
right_ir_height: 400
right_ir_fps: 15
right_ir_format: "Y8"
right_ir_qos: "SENSOR_DATA"

enable_sync_output_accel_gyro: false
enable_accel: false
accel_rate: "200hz"
accel_range: "4g"
enable_gyro: false
gyro_rate: "200hz"
gyro_range: "1000dps"
liner_accel_cov: "0.01"
angular_vel_cov: "0.01"
